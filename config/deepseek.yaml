# DeepSeek live-run profile (spec §15). Omitted knobs inherit the canonical
# defaults from deepreason.config.Config; only deliberate differences belong
# here. DeepSeek's API is OpenAI-compatible.
# Set DEEPSEEK_API_KEY in the environment. Model ids marked "auto"/"auto-alt"
# are resolved against the provider's /models list at adapter build time
# (llm/endpoints.py:resolve_model) — works from `deepreason run`, the MCP
# server, and the scripts alike.
#
# Honest note (§9/§17): the judge SHOULD run on >=2 endpoints from different
# model FAMILIES; with a single provider we approximate with two different
# DeepSeek models, which catches intra-provider disagreement only.

HV_MIN: 0.5
HV_K: 5
JUDGE_ERR_MAX: 0.25
AUDIT_PERIOD: 10
N_SCHOOLS: 2
STANCE_DECAY: 20
RESEED_DIST_MIN: 0.15
NEAR_DUP_EPS: 0.35
VS_K: 3                       # 4 skeleton candidates truncated at sane caps; 3 fits
LAMBDA_FLOOR: 0.3
CAPTURE_W: 10
# Budget triage (attention only, never status): cap the two most expensive
# call sites the first live run exposed.
ARG_CRIT_PER_CYCLE: 3
RUBRIC_TRIALS_PER_ARTIFACT: 1
# Batch criticism (TOKEN_ECONOMY angle 3): one critic call covers up to 3
# admitted targets; warrants stay per-target with their own nu.
CRIT_BATCH_K: 3

# The role table is the model-change plug (llm/providers.py): endpoint,
# model, provider, reasoning, caps are all config. reasoning knob:
# "none" disables the thinking trace (docs/TOKEN_ECONOMY.md: ~93% of a
# v4-pro call was reasoning we never asked for); an int is a token budget;
# null keeps the provider default. Downgrades are certified by the audit
# battery (planted-flaw, paraphrase-flip, valid-JSON), not assumed.
roles:
  conjecturer:          { endpoint: "https://api.deepseek.com", model: auto, temperature: 1.0, api_key_env: DEEPSEEK_API_KEY, reasoning: none, max_tokens: 4000, json_mode: true, logprobs: true }
  argumentative_critic: { endpoint: "https://api.deepseek.com", model: auto, temperature: 0.7, api_key_env: DEEPSEEK_API_KEY, reasoning: none, max_tokens: 2800, json_mode: true }  # sized for CRIT_BATCH_K cases per call
  defender:             { endpoint: "https://api.deepseek.com", model: auto, temperature: 0.7, api_key_env: DEEPSEEK_API_KEY, reasoning: none, max_tokens: 900, json_mode: true }
  variator:             { endpoint: "https://api.deepseek.com", model: auto, temperature: 1.0, api_key_env: DEEPSEEK_API_KEY, reasoning: none, max_tokens: 3000, json_mode: true }
  # Judge reasoning certified by the planted-flaw battery (experiments/
  # results/judge_battery_report.json): pro scores 0.0 error / 0.0 bias with
  # reasoning OFF at half the tokens; flash NEEDS reasoning (0.125 error,
  # 0.375 verbosity bias without it). Hence: primary seat off, alt default.
  judge:
    - { endpoint: "https://api.deepseek.com", model: auto, temperature: 0.0, api_key_env: DEEPSEEK_API_KEY, reasoning: none, max_tokens: 2400, json_mode: true }
    - { endpoint: "https://api.deepseek.com", model: auto-alt, temperature: 0.0, api_key_env: DEEPSEEK_API_KEY, reasoning: null, max_tokens: 2400, json_mode: true }
  synthesizer:          { endpoint: "https://api.deepseek.com", model: auto, temperature: 0.9, api_key_env: DEEPSEEK_API_KEY, reasoning: none, max_tokens: 1400, json_mode: true }
  thesis:               { endpoint: "https://api.deepseek.com", model: deepseek-v4-flash, temperature: 0.3, api_key_env: DEEPSEEK_API_KEY, reasoning: none, max_tokens: 6000, json_mode: true }
