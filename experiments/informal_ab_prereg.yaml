# Pre-registration: informal-domain A/B (T2 of the test battery)
# Committed BEFORE either arm runs.
#
# Question: does the full conjecture-criticism harness produce better
# informal-domain output than raw generation at a matched token budget?
# This is the harness's actual value proposition, and the regime where
# criticism demonstrably acts (criticism-suite trial survival rate 31.8%);
# the mechanically-checkable regime was closed by T1c (no error mass).
#
# Gate (passed): judge battery measured 0.0 planted-flaw error / 0.0
# verbosity bias for both deployed ensemble seats (pro/reasoning-off,
# flash/reasoning-default) — the scorer is calibrated.

arms:
  harness: scripts/live_run.py --suite republic --root runs/ab_harness
    --token-budget 70000 (v4-pro generation, certified judge ensemble,
    full Conj->Crit->Adj with trials). Top 3 = ACCEPTED artifacts addressed
    to pi-republic that parse as skeletons, ranked by state.hv descending,
    then earliest registration seq.
  solo: same generator (v4-pro, temperature 1.0, reasoning off, max_tokens
    4000, json_mode), same information (pi-republic description + the
    std-hist rubric verbatim), ConjecturerOutput contract, candidates
    accumulated to ~60k tokens; then ONE self-selection call picks its own
    top 3 (the raw-model analogue of internal quality control).

scoring:  # blind: content only, no provenance
  pairs: rank-matched top-3 vs top-3 (3 pairs)
  per pair, per judge seat (pro/reasoning-off, flash/reasoning-default):
    pairwise ruling with mandatory decisive_point, BOTH presentation
    orders; a seat votes only if its two orders agree on the real winner
    (order-swap consistency), else it abstains
  pair outcome: net seat votes (harness wins > 0, solo wins < 0, tie 0)
  secondary: absolute rubric verdict (pass/fail vs std-hist) per artifact
    from each seat

outcome_mapping:
  harness_wins: harness takes at least 2 of 3 pairs (net votes)
  solo_wins: solo takes at least 2 of 3 pairs
  inconclusive: anything else (including mass abstention)
  caveats: n=3 pairs, one problem, one provider — a directional reading,
    not a general verdict; both arms share one generator so this measures
    the marginal value of the criticism/adjudication apparatus, not model
    quality.
budget: harness 70k + solo 65k + scoring <= 20k  (~155k total)

# ---------------------------------------------------------------------
# AMENDMENT (committed before rescoring): cross-family judge stage.
# First scoring pass was inconclusive by POSITION-BIAS SATURATION: every
# same-family (DeepSeek) seat preferred position A in both orders, so the
# order-swap screen discarded all votes. A second model family is now
# available (poolside/laguna-m.1). Calibration first, per the gate:
# planted-flaw error 0.0 (passes); verbosity bias 0.25 (caveat — noted,
# mitigated by skeleton pairs being length-matched).
rescore:
  seats: pro/reasoning-off, flash/default, laguna-m.1/default (3 seats)
  pairs: the SAME committed top-3 vs top-3 (no regeneration)
  rules: identical (order-swap-consistent votes only; net per pair)
  outcome_mapping: harness_wins / solo_wins at >= 2 of 3 pairs, else
    inconclusive. The cross-family seat's votes are also reported
    separately: if DeepSeek seats abstain again while laguna votes
    consistently, that isolates same-family saturation as the mechanism.
  result: RAN — inconclusive by judge-general position bias (8/9 votes
    discarded; the sole surviving vote favored solo). Saturation is a
    property of pairwise winner-picking, not family overlap.

# ---------------------------------------------------------------------
# AMENDMENT 2 (committed before running): score with the HARNESS-DESIGNED
# instrument — design aac313a1af55 from instrument_designs.json (criterion-
# level forced choice, planted-flaw-calibrated judges, verbosity penalty),
# produced by the unrefereed pro drive on pi-instrument.
instrument_stage:
  pairs: the SAME committed top-3 vs top-3, PLUS one control pair of known
    quality difference — solo_top3[0] vs a deterministic degradation of
    itself (truncated to 55% of characters + an appended unfalsifiability
    sentence violating the rubric). The control gates the instrument:
    if it cannot detect a constructed gap, its A/B verdict counts nothing.
  criteria (fixed, decomposing std-hist): mechanism-specificity,
    falsifiability, scope-discipline, internal-coherence,
    evidential-grounding
  protocol: per pair x BOTH orders x 3 calibrated seats (pro/off,
    flash/default, laguna-m.1): one call returns a forced choice
    (A/B/tie) PER criterion; seat score = mean over criteria of +1/-1/0,
    averaged over the two orders (position bias cancels in the mean and
    is REPORTED as the per-order disagreement rate)
  verbosity_penalty: the longer artifact's margin is reduced by
    min(0.3, 0.1 * (len_longer/len_shorter - 1))
  decision_rule: pair margin = mean adjusted seat score; harness point if
    margin > +0.15, solo point if < -0.15, else tie. Outcome mapping as
    before (>= 2 of 3 real pairs). Instrument validity gate: control-pair
    margin >= +0.2 toward the undegraded artifact.
  budget: 24 scoring calls, <= 45k tokens

