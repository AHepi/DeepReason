# Pre-registration: the decisive criticism experiment
# Committed BEFORE any model call on the hard2 question set (first-look rule).
#
# Provenance: the criticism suite (runs/criticism, report
# experiments/results/criticism_design_report.json) left two rival surviving
# theories. This experiment executes the decisive test both point at, testing
# the POSITIVE, measurable claim first (falsificationist ordering):
#
#   d239d34e54e6 (regime theory): criticism-filtering beats self-consistency
#     when majorities are contested — base error high, k moderate — and a
#     CONFIDENCE-based critic (flagging low-confidence candidates) breaks
#     near-ties correctly. Registered forbidden case: "Experiment with
#     confidence-based critic on high base error and optimized threshold
#     yields harness accuracy <= self-consistency."
#   57e09ea4045b (impossibility claim): without precision=1.0 on flagged
#     items, filtering adds noise and cannot beat SC; any observed win is
#     sampling error.

design:
  generator_and_critic_model: deepseek-v4-flash   # weaker model to raise base error
  k: 5                                            # candidates per question
  questions: hard (20 q) + hard2 (24 q) = 44      # committed before first look
  confidence_signal: mean token surprisal of the generation (-mean logprob),
    captured via logprobs at generation time; NO extra calls
  arms:
    single: candidate[0]
    self_consistency: majority vote over all k
    llm_critic (harness): majority over candidates the critic did not refute
    confidence_filtered: majority over candidates with surprisal <= threshold;
      threshold tuned on the CALIBRATION split only; empty pool falls back to
      the full pool (same fallback rule as the harness arm)
  split: questions sorted by id; even index -> calibration (threshold tuning),
    odd index -> test (all reported comparisons)
  budget: probe <= 60_000 tokens; full collection <= 300_000 tokens

stages:
  probe:
    what: generation only (no critic calls), k=5, questions h2-01..h2-08
    decision_rule: proceed to full collection iff probe candidate base error
      >= 0.10; otherwise the regime is unreachable with this model/set —
      report "regime not reached", do not run the full collection
    result: RAN 2026-07-05 — base error 0.0 (40/40 correct). The hard2 trap
      questions are classic puzzles (memorized); regime NOT reached on this
      set. Per the escalation clause, probe2 registered below BEFORE running.
  probe2:
    what: generation only, k=5, questions h01..h08 of the ORIGINAL hard set
      (novel randomized arithmetic, never measured on flash)
    decision_rule: proceed iff probe2 base error >= 0.10; the full collection
      then runs on the hard set ONLY (20 q; calibration = even index, test =
      odd index of sorted qids, as above). hard2 is dropped from the full
      collection — measured base error 0 means it can only dilute the regime.
      If probe2 also fails the gate, report regime-not-reached as the
      experiment's outcome: this provider's weakest model does not err enough
      on verifiable questions for filtering to matter (itself evidence
      relevant to d239's scope clause).
    result: RAN 2026-07-05 — base error 0.0 (40/40 correct). OUTCOME:
      regime NOT reached; the pre-registered experiment terminates here.
      Neither theory is refuted — d239's forbidden case requires an
      in-regime run; 57e0 remains untested. Standing meta-finding: on this
      provider, even the weakest model with reasoning off does not err
      measurably on closed-form verifiable questions (two independently
      constructed 8-question probes, 80/80 candidates correct), so the
      contested-majority regime cannot be constructed from questions whose
      answers can be programmatically checked. Criticism's measurable value
      on this provider must be sought where verification is NOT mechanical —
      the informal-domain trial protocol (where the criticism suite itself
      showed a 31.8% ruling survival rate and real refutations) — or on a
      provider/model with genuinely higher base error.
  stage_xs:  # registered before first model call on this configuration
    what: a SECOND model family became available (poolside). Generator =
      poolside/laguna-xs.2 (smallest available model; plausibly real base
      error); critic = deepseek-v4-flash (cross-family, calibrated: planted
      flaw error 0.0 with its default reasoning). ONE full collection over
      all 44 committed questions, k=5, gen and crit in the same pass — no
      gen-only probes (they waste a round trip when the regime IS reached).
    limitation: poolside returns no logprobs, so the confidence-filtered
      arm is UNAVAILABLE; d239's specific confidence mechanism cannot be
      tested on this generator. The core rivalry still can be: llm-critic-
      filtered vote vs self-consistency in a contested regime.
    outcome_mapping:
      regime_reached: test-split candidate base error in [0.15, 0.60]
      criticism_wins: regime_reached AND llm_critic beats self_consistency
        on the test split with net fixed-minus-broke >= +2 (supports d239's
        direction, refutes 57e0's universal reading)
      criticism_fails: regime_reached AND llm_critic <= self_consistency
        net (supports 57e0; d239's confidence variant stays untested)
      regime_not_reached: with TWO families ceilinged, d239's regime is
        declared unreachable on available providers; the rivalry stands
        adjudicated only by the informal-domain evidence.
  full:
    what: full collection (gen + critic) over all 44 questions with
      confidence capture; then score per the arms above

outcome_mapping:  # decided BEFORE looking at results
  regime_reached: test-split candidate base error in [0.15, 0.60]
  refutes_d239_forbidden_case: regime_reached AND confidence_filtered test
    accuracy <= self_consistency test accuracy (net fixed-minus-broke <= 0)
  supports_d239_and_refutes_57e0_universal_reading: regime_reached AND
    confidence_filtered strictly beats self_consistency on the test split
    with net fixed-minus-broke >= +2 questions
  regime_not_reached: no verdict on either theory; report the escalation
    options (weaker model, adversarial question generation) instead
  caveats: n_test ~= 22 questions is small; any positive result is a
    single-provider, single-model-family observation and says nothing about
    generalization. Both verdicts will be GROUNDED back into runs/criticism
    as evidence artifacts against the registered forbidden cases.
