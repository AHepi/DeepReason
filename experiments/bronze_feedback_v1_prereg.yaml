# Bronze feedback v1 - PRE-REGISTERED, committed before any live call.
# Phase J study 3, runs LAST: only after the court-cross study has produced
# a calibrated court and the repaired control flow has passed the pilot.
# Question: does criticism feedback help or hurt the search itself?

design:
  generator: fixed (single model, chosen from repertoire v2's report as the
    arm with the widest emitted mechanism coverage; named here before launch
    via amendment, never after data)
  arms:
    active: calibrated court verdicts feed back (trial-gated authority per
      the repaired flow); refutations remove candidates from the frontier
    observe_only: identical court runs, verdicts recorded but statuses
      untouched
  matched: same seed, same cycles (30), same token budget per arm, same
    manifest, same embedder
  scoring: FROZEN EXTERNAL evidence dossier (compiled and committed before
    the run: dated chronology anchors, destruction-layer list, paleoclimate
    series references) + emitted-population diversity from the census
    program. Court-created survivor counts are NOT an outcome (plan
    do_not_use_survivor_count_as_quality honored).

predictions:
  P1:
    statement: active feedback changes the emitted population - mechanism-
      class distribution differs between arms beyond seed noise (chi-square
      on blind-coded classes, protocol frozen before unblinding)
  P2:
    statement: active feedback does NOT reduce evidence contact - the
      fraction of emitted proposals citing at least one dossier-checkable
      anchor is within 10 percentage points of the observe-only arm
    falsifier: active arm >= 20 points BELOW observe-only - feedback
      pressure trades evidence contact for court appeasement, and active
      authority stays off by default for text workloads
  P3:
    statement: no gate pathology recurs - zero structural-only battery
      blocks and 100 percent receipt completeness in both arms

decision_rules: report experiments/results/bronze_feedback_v1_report.json;
  index line appended
budget: {llm_tokens: <= 800000, max 3 in flight}

# --- amendment 1, recorded BEFORE any live call (zero tokens spent) ---
amendment_1:
  generator: kimi-k2.6, per the repertoire v2 report (widest emitted
    mechanism-class coverage, lowest near-dup rate 0.25; the two
    falsifier-flagged generators are excluded by their own verdicts)
  court_both_arms: identical in both arms - critic deepseek-v4-flash
    (cross-family to the generator, distributions known from court-cross),
    defender deepseek-v4-pro, judges [deepseek-v4-pro, gpt-oss:120b].
    The ONLY difference between arms is ARGUMENTATIVE_AUTHORITY:
    trial_required (active) vs observe_only.
  calibrated_court_gate: satisfied in protocol terms per the court-cross
    result block - no court differentiates (P1 refuted at 1.18pp), so the
    defended trial protocol itself is the calibration; sustained
    convictions are rare (3/255) and seat-stable (P3 confirmed)
  scoring_instruments: evidence contact = share of emitted proposals whose
    text matches at least one anchor-term set in the frozen dossier
    (experiments/bronze_evidence_dossier_v1.json, committed before launch);
    mechanism classes = the frozen rep_v2_score coder; P1 chi-square at
    p < 0.05 over class counts
  runtime: evidence mode, 30 cycles, 400000 tokens per arm, NEAR_DUP_EPS
    0.35, CONTROLLER false, both arms concurrent (2 in flight)
  tokens_spent_before_amendment: 0

# --- supersession, recorded after the run but BEFORE scoring ---
superseded_before_scoring:
  what_happened: both arms launched under amendment 1 and ran to their
    budget guards (792840 tokens total) before operator review halted the
    program. The operator identified fatal design flaws; P1-P3 are NOT
    scored - verdicts from this design would be uninterpretable.
  flaws_identified_by_operator_review:
    - near-inert treatment - the chosen court sustains almost nothing, so
      trial_required vs observe_only compares nearly identical processes
    - evidence-contact metric saturates on topic name-drops ("ugarit" is
      in the problem statement itself); mention, use, and correct use are
      conflated
    - proposal-level chi-square treats dependent emissions from one
      evolving root as independent subjects; the run/paired-seed is the
      experimental unit, and n=1 seed per arm cannot support P1
    - the unchanged covers/excludes skeleton manufactures most objections
      (court-cross P2), so active feedback would largely train appeasement
      of a formatting trap
  zero_cost_checks_on_the_spent_data:  # the salvage
    treatment_near_inertness_CONFIRMED: trial_required minted exactly 1
      argumentative warrant (16 trials declined) vs observe_only 0; 3 vs 0
      refutations; one sustained trial per ~400k tokens cannot separate
      arms at n=1 seed
    evidence_metric_ceiling_CONFIRMED: dossier contact 15/15 and 17/18
      conjectures; "ugarit" alone matches 13/15 and 17/18; the metric has
      no discriminating power as designed
    cost_finding: rubric-trial machinery consumed most of both budgets
      (11 and 7 cycles completed of 30; trial-llm 275 and 288 calls) -
      the court dominates spend even in observe-only mode
  roots_retained: experiments/bronze_feedback_v1_superseded_2026-07-14/
    (candidate paired-seed material for a corrected feedback v2)
  supersession_path: corrected program per operator review - (1) schema
    comparator test on the frozen court-cross pool, (2) matched-pair court
    calibration with sensitivity/specificity gates before any active
    authority, (3) feedback v2 with 3-5 paired seeds, structured evidence
    links, multi-label mechanism codebook, and a fail-closed embedder
    policy for evidence mode
