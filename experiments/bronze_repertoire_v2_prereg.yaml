# Bronze repertoire v2 - PRE-REGISTERED, committed before any live call.
# Successor to bronze flat v1 per the post-run repair plan (phase J): vary
# ONLY the generator model; measure the emitted proposal population, not
# the court's survivors. Runs only after the repaired control flow (gate
# receipts, observe-only authority, two-phase compilation) has passed the
# phase-I pilot release gates.

question: pi-bronze, unchanged from bronze_flat_v1_prereg.yaml

design:
  treatment: generator model only. Prompts, role policy, budget, embedder,
    scoring, and the downstream pipeline are held fixed across arms.
  arms: [deepseek-v4-pro, qwen3.5:397b, kimi-k2.6, gpt-oss:120b]
  criticism_policy: ARGUMENTATIVE_AUTHORITY=observe_only - objections are
    recorded as scrutiny, never status-changing; program and execution
    verdicts keep authority
  runtime: manifest-bound (schema v2, workload text, nomic embedder with
    calibrated NEAR_DUP_EPS, controller off, research off)
  cycles: 30 per arm
  budget: 300000 tokens per arm, reserve-settle meter, max 3 in flight
  analysis_population: EVERY emitted candidate (census program), not the
    admitted subset - dispositions joined per candidate with gate receipts

predictions:  # literal thresholds, decided against the census output
  P1:
    statement: with the repaired gate, admitted distinct-mechanism count
      per arm is >= 3x bronze flat v1's per-stream admitted count (which
      the broken gate capped at 3-6)
  P2:
    statement: generator families differ in emitted mechanism-class
      coverage - at least one mechanism class is emitted by one arm and
      absent from another arm's full census (blind-coded classes, coding
      protocol frozen before unblinding)
  P3:
    statement: emitted-population near-duplicate rate (nomic, calibrated
      radius recorded before scoring) is < 0.5 for every arm - i.e. the
      majority of emitted proposals are not paraphrases of earlier ones
    falsifier: any arm >= 0.7 - that generator's repertoire is
      paraphrase-dominated and repertoire claims for it are withheld

mechanism_novelty: reported as not_measured unless a frozen literature
  baseline and blind coding protocol are committed BEFORE unblinding
  (plan do_not_claim_novelty_from_embeddings_alone honored)

decision_rules: report experiments/results/bronze_repertoire_v2_report.json
  (census-derived, no hard-coded numbers); index line appended
budget: {llm_tokens: <= 1200000}

# --- amendment 1, recorded BEFORE any live call (zero tokens spent) ---
amendment_1:
  what: the prereg fixed "role policy" across arms without naming the fixed
    court. Pinned here before launch - ONLY the conjecturer varies per arm;
    every other role (argumentative critic, defender, variator, synthesizer,
    thesis, judge seat 1) is deepseek-v4-pro in ALL arms, judge seat 2 is
    gpt-oss:120b in ALL arms (the pilot-validated matrix). The gpt-oss arm
    therefore has conjecturer gpt-oss:120b under the same fixed court.
  runtime: evidence mode, NEAR_DUP_EPS 0.35, CONTROLLER false, cycles 30,
    300000 tokens per arm, reserve-settle meter
  concurrency: arms run 3-at-a-time (subscription ceiling); the fourth arm
    launches when a slot frees
  tokens_spent_before_amendment: 0

# --- appended after the run (verdicts against the prereg as written) ---
result:
  report: experiments/results/bronze_repertoire_v2_report.json
  roots: experiments/bronze_repertoire_v2_2026-07-14/ (all four verify
    clean)
  verdicts: {P1: REFUTED, P2: CONFIRMED, P3: REFUTED}
  p3_falsifier: triggered for deepseek-v4-pro (0.867) and qwen3.5:397b
    (0.75) - their repertoires are paraphrase-dominated at the frozen
    radius and repertoire claims for them are withheld per the prereg
  measured:
    admitted: {deepseek: 15, qwen: 24, kimi: 12, gpt-oss: 24}
    admitted_distinct_nomic_clusters: {deepseek: 2, qwen: 6, kimi: 9,
      gpt-oss: 10}   # P1 bars 18/9/12/13 - all miss
    emitted_near_dup_rate: {deepseek: 0.867, qwen: 0.75, kimi: 0.25,
      gpt-oss: 0.576}
    tokens: 1185308 of 1200000 (all four arms stopped by the reserve-settle
      guard, zero overshoot)
  headline_readings:
    - the repaired gate admitted 12-24 conjectures per arm where the broken
      gate had capped v1 at 3-6; the bottleneck moved from the gate to the
      generators themselves
    - P1 fails NOT because arms admitted little but because admitted sets
      collapse under the frozen nomic 0.19 clustering; the correction-1
      caveat applies in full - the instrument conflates same-topic distinct
      mechanisms, so these counts are conservative lower bounds
    - P2 confirms real family differences in emitted mechanism-class
      coverage (kimi is the most diverse emitter at 0.25 near-dup; deepseek
      the most repetitive at 0.867)
    - widest-coverage generator by emitted class count and lowest near-dup
      rate - kimi-k2.6 - becomes the feedback-v1 generator candidate per
      that prereg's amendment procedure
  instrument_caveat: verdicts stand as preregistered; the distinctness
    instrument (frozen before unblinding) is known-conservative from
    correction 1. A mechanism-level distinctness instrument (structural,
    not embedding) is the open tooling gap.
