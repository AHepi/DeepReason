# Pre-registration: basin study, live manipulation battery
# Committed BEFORE any live arm runs.
#
# Question: WHEN does conjecture start circling a basin (low variation,
# little novelty) and WHY — which mechanism pulls it there?
#
# Offline phase (basin_offline_report.json, zero tokens, 8 committed
# roots) already established, correlationally:
#   F1: novelty declines with PROBLEM AGE for strong models on fixed
#       problems (needham r=-0.68) and RECOVERS under problem turnover
#       (criticism run, +0.31 with age, late/early=1.12 — successor
#       spawning is the one observed antidote).
#   F2: strong models are BELOW-chance at echoing their pack (nearest
#       prior artifact was a displayed exemplar at 0.22-0.46x chance):
#       conditioning is anti-basin for them (the VS diversity directive
#       is honored). The weak model at temp 0.2 is ABOVE chance (1.12x,
#       raw rate 0.78): pack parroting.
#   F3: survivorship narrowing ruled out: accepted-subset diversity is
#       0.82-0.99x the full pool's — adjudication is not the funnel.
#   F4: the embedder scale is nearly blind: within-problem vs
#       cross-problem distance distributions overlap almost entirely
#       (e.g. medians 0.645 vs 0.671 on runs/criticism) — which is WHY
#       school_convergence (threshold 0.15 on this scale) never fires.
#   F5: stance decay untestable offline — only the criticism run crossed
#       lineage 20, confounded by problem turnover.
#
# The live battery tests what correlations cannot: causation, by
# manipulating one variable per arm.

hypotheses:
  H-exhaustion (primary): for a strong model on a FIXED problem the
    basin is the model's own answer repertoire depleting — not pack
    conditioning. Novelty declines because the k-th distinct answer to
    the same question does not exist, not because the pack anchors it.
  H-echo-weak: for a weak model, the basin is pack echo, and sampling
    temperature is its dial.
  H-decay: vanishing stance weight (lineage > STANCE_DECAY) removes the
    only inter-school differentiator in the pack, so schools converge
    on each other after crossing it.
  H-complement: the built-in §11.4 complement directive ("produce the
    attempt these summaries make least likely") buys real novelty —
    the ladder's remedy actually works when applied every cycle.

design:  # conjecture-only runs: no critics/judges — generation dynamics
  # isolated from adjudication (licensed by F3: adjudication is not the
  # funnel). All arms: suite bronze (pi-bronze, fixed single problem),
  # N_SCHOOLS=2, VS_K=2, ~26 cycles -> ~50 conjectures/arm, fresh roots
  # runs/basin/<arm>, token cap 60k/arm (scheduler stops at budget).
  arms:
    A-control:    v4-pro, temp 1.0, NEIGHBOURHOOD_N=8, decay default(20)
    B-blind:      v4-pro, NEIGHBOURHOOD_N=0 (generator never sees prior
                  output; the gate still dedupes downstream)
    C-decay-off:  v4-pro, STANCE_DECAY=1e9 (stance never fades)
    D-decay-fast: v4-pro, STANCE_DECAY=5 (stance gone after 5/school)
    E-complement: v4-pro, COMPLEMENT_ALWAYS=true
    F-weak-cold:  laguna-m.1, temp 0.2, NEIGHBOURHOOD_N=8
    G-weak-hot:   laguna-m.1, temp 1.0, NEIGHBOURHOOD_N=8

metrics:  # all from views/basin.py, the same instrument as offline
  primary: late_over_early novelty ratio; rolling novelty curve;
    echo_vs_chance; inter-school centroid distance trajectory;
    duplicate/gate-block counts (from the log)
  per arm also: within-school diversity, surprisal slope

predictions:  # committed before the first token
  P1 (H-exhaustion): B-blind's late_over_early is within 0.15 of
    A-control's, AND B produces >= 2x A's duplicate/near-dup gate
    events (it cannot see what it already said). If instead B stays
    HIGH-novelty while A declines, conditioning (not exhaustion) drives
    the basin and H-exhaustion is REFUTED.
  P2 (H-echo-weak): F-weak-cold echo_vs_chance > 1.0 > G-weak-hot
    echo_vs_chance, and G's late_over_early > F's by >= 0.1.
  P3 (H-decay): C-decay-off's mean inter-school centroid distance over
    the final 20 conjectures exceeds D-decay-fast's by >= the offline
    within-problem IQR/2; A-control sits between them. If C ~= D, the
    stance section does no differentiating work and H-decay is REFUTED
    (consistent with F2's below-chance echo: the model barely reads
    the stance line either).
  P4 (H-complement): E-complement's late_over_early >= A-control's
    + 0.1, or REFUTED (the documented remedy is placebo at pro level).
  ordering: P1 is the primary claim; P2-P4 are secondary and reported
    regardless of P1's outcome.

decision_rules:
  each prediction evaluates independently CONFIRMED/REFUTED/UNDECIDED
  (undecided = an arm died early or metrics returned None; say so).
  No verdict may cite a metric not listed above. The embedder is
  HashingEmbedder(128) — same scale caveat F4 applies to everything;
  effects are likely UNDERSTATED, so confirmations are conservative
  and refutations of small predicted effects are weak evidence.

budget: 7 arms x <= 60k = <= 420k tokens hard ceiling; expected ~300k
  (pro skeleton candidates ~1.2k completion tokens; laguna cheaper).

# ---------------------------------------------------------------------
result: RAN — all 7 arms complete, zero invariant violations. Spend
  425.7k vs 420k ceiling (+1.4%, per-arm check-before-spend overshoot).
  P1-exhaustion: formally REFUTED as committed (conjunction), but
    decomposed: the CAUSAL CORE held — blind late/early 0.888 vs
    control 0.846 (within 0.15, on 96 blind draws vs 60): novelty
    declines the same whether or not the generator sees prior output,
    so the decline is model-internal, not pack conditioning. The dup
    clause failed (blind dups 0, not >= 2x): 96 blind draws produced
    no near-collisions — the repertoire is big enough that exhaustion
    shows as semantic clustering, never literal repetition. The dup
    sub-prediction was wrong about the mechanism's surface signature.
  P2-echo-weak: UNDECIDED — G-weak-hot registered only 8 conjectures
    (36 gate blocks; see circling finding below), too few for the
    novelty metric. F-weak-cold alone: echo 0.87x chance, late/early
    1.037 — the cold weak model did NOT parrot on this problem,
    unreplicating offline S3 (different problem, roles). H-echo-weak
    is weaker than offline data suggested.
  P3-decay: REFUTED AND INVERTED. Predicted permanent stance keeps
    schools apart; measured the opposite: inter-school distance
    D-fast 0.690 > C-never 0.545, and D-fast had the flattest novelty
    of any pro arm (late/early 0.973 vs control 0.846). Fast stance
    rotation is ANTI-basin on both metrics.
  P4-complement: REFUTED — placebo at pro level (E 0.865 vs A 0.846,
    needed +0.1). Dissociation: E had the LOWEST echo of any arm
    (0.49x chance — the directive does push output away from the
    displayed exemplars) yet no novelty gain: it moves the model
    relative to the pack, not out of its own basin.
  unpredicted_finding (the circling mechanism, caught live): hard
    circling is REFUTED-ATTRACTOR ORBITING. C-decay-off: one artifact
    failed skeleton-wf mechanically -> refuted -> 15 successor/spawn
    problems -> the stance-pinned generator re-emitted battery-
    equivalent candidates 54 times (gate blocks) + 27 no-register
    cycles, burning 4.3x tokens per registered conjecture; echo 0.70
    raw (2.4x control). G-weak-hot: same signature (2 refutations,
    36 gate blocks, 8 registered). Arms with zero refutations had
    ZERO gate activity. Circling = (a refuted attractor exists) AND
    (the generator's identity is pinned to it — permanent stance, or
    weak+hot model). Default-decay strong arms never entered orbit.
  answer_on_record:
    when: soft basin — gradual, shallow novelty decline with problem
      age (late/early 0.85-0.89 by ~60 draws), no hard onset. Hard
      basin — immediately after a refutation, iff stance is pinned or
      the model is weak at high temperature.
    why: model-internal repertoire exhaustion (proved by the blind
      arm), plus refuted-attractor orbiting under pinned identity.
      NOT pack echo (below chance in every completed arm, live and
      offline), NOT adjudication narrowing, NOT curable by the
      complement directive.
    antidotes_measured: problem turnover (offline: criticism run
      recovered to 1.12) and fast stance rotation (D: 0.973 novelty,
      best school separation). Both already exist in the system;
      STANCE_DECAY should default LOWER, not higher.
    detector_recommendation: school_convergence (embedding threshold)
      is the wrong instrument — the embedder is scale-blind (F4) and
      echo is below chance anyway. The cheap, scale-free circling
      signal already in the log is GATE-BLOCK RATE (battery-equivalent
      refusals per cycle): 0 in every healthy arm, 54 and 36 in the
      two orbiting arms. Wire the ladder to that instead of
      RESEED_DIST_MIN.
  report: experiments/results/basin_live_report.json (arm metrics,
    prediction evaluations; full curves in runs/basin/*)
