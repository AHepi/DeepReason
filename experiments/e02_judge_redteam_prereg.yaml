# E0.2 Judge and skeleton red-team — PRE-REGISTERED, tranche 1.
# (experiment program docs/EXPERIMENT_PROGRAM_2026-07.md, Tier 0.)
# Committed BEFORE any adversarial artifact is generated or judged.
#
# Question: can an adversarial generator get worthless artifacts past the
# judges and the skeleton machinery, and does flaw detection generalize
# past the known planted-flaw taxonomy?

scope_note: >
  Tranche 1 at reduced scale relative to the program sketch (40 artifacts
  per sub-battery instead of 200; two judge models instead of four; text
  workload only). The full matrix runs when tranche-1 numbers justify the
  spend. Sub-battery (c) bias-at-scale is DEFERRED to its own registration.

provider:
  endpoint: https://ollama.com/v1 (config/ollama-live.yaml routes)
  concurrency: max 3 in flight, per subscription

design:
  adversary: deepseek-v4-pro (via Ollama Cloud), prompted out-of-band to
    produce (a) plausible-but-flawed explanatory artifacts with flaw
    classes OUTSIDE the known planted-flaw taxonomy (subtle unit errors,
    vacuous generality, circular support, verifier-shaped-but-wrong) and
    (b) ReasoningEnvelopes whose counterconditions are deliberately
    toothless (never triggerable, or trivially satisfied)
  judges:
    same_family_pair: [gpt-oss:120b, gpt-oss:120b]
    cross_family_pair: [gpt-oss:120b, qwen3-coder:480b]
  volumes:
    unknown_flaw_artifacts: 40
    known_flaw_artifacts: 40   # from the existing planted-flaw battery
    toothless_envelopes: 40
  judging: each artifact judged by both pairs; a catch = the pair flags
    the flaw (majority of 2 seats; ties count as no-catch, recorded)

measurements:
  M1: unknown-flaw catch rate vs known-flaw catch rate, per pair
  M2: toothless-envelope admission rate through gate + criticism + judge
  M3: cross-family minus same-family catch rate, percentage points

predictions:
  P1:
    statement: unknown-flaw catch rate >= 0.8 x known-flaw catch rate
      (cross-family pair)
    falsifier: < 0.5x, and planted-flaw certification only certifies
      memorized flaw classes; judge audit numbers are demoted in reports
  P2:
    statement: toothless-envelope admission <= 10 percent
    falsifier: > 30 percent, and skeletons are gameable; a countercondition
      satisfiability checker becomes a mandatory gate for Tier 2/3
      survivor counts
  P3:
    statement: cross-family pair catches >= 5 percentage points more
      adversarial flaws than the same-family pair
    falsifier: no difference, and the cross-family rule is superstition

decision_rules:
  - verdicts CONFIRMED / REFUTED / UNDECIDED against the literal numbers
  - report lands at experiments/results/e02_judge_redteam_t1_report.json
  - one line appended to experiments/results/INDEX_2026-07-13.md
  - adversarial prompts and raw judgments retained under the report's
    blobs (small, committed) so the tranche is auditable

budget:
  llm_tokens: <= 2000000 (adversary generation + 4 judgments x 120 items)
  wall_clock: hours, parallel at 3

# --- appended after the run, per methodology (verdict against the prereg
# --- as written; the sections above are unedited) ---
result:
  report: experiments/results/e02_judge_redteam_t1_report.json
  verdicts: {P1: REFUTED, P2: CONFIRMED, P3: REFUTED}
  measured:
    unknown_vs_known_ratio_cross_family: 0.189   # falsifier line was 0.5
    known_catch_rates: {same_family: 0.975, cross_family: 0.925}
    unknown_catch_rates: {same_family: 0.55, cross_family: 0.175}
    toothless_admission: 0.0
    toothless_funnel: {passed_gate: 40, survived_criticism: 0,
                       not_flagged_by_judge: 30, admitted: 0}
    cross_minus_same_family_pp: -41.25            # confirm line was +5
    total_tokens: 629674
  readings:
    - P1 refuted DECISIVELY, below even the falsifier line: judges catch
      92-98 percent of memorized flaw classes but only 18-55 percent of
      novel ones. Planted-flaw certification certifies the taxonomy, not
      flaw detection. All judge-audit numbers in reports must carry this
      demotion until a broader battery exists.
    - P2 confirmed, but the funnel shows WHERE the defense lives, and it
      is not the judges: all 40 toothless envelopes passed validation and
      the gate, the argumentative critic killed all 40, and the judges
      would have admitted 30 of 40. Criticism is the wall; judging alone
      is gameable.
    - P3 refuted AND INVERTED: the cross-family pair is 41pp WORSE on
      adversarial flaws. Mechanism: majority-of-2 with tie-as-no-catch
      means a pair catches only when BOTH seats agree; a second seat from
      a different family disagrees more, so cross-family pairing VETOES
      catches instead of adding coverage. The cross-family rule as
      aggregated today reduces adversarial-flaw detection; either the
      aggregation (require-either instead of require-both) or the rule
      needs a follow-up prereg before Tier 2/3 rely on it.
  caveats: single adversary model; text workload only; majority-of-2
    crudeness; 40 items per cell; neutral-topic constraint on corpus
