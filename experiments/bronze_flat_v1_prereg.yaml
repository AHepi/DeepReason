# Bronze flat run v1 - PRE-REGISTERED OBSERVATIONAL CASE STUDY, committed
# before any live call. Operator directive: stop the micro-testing; run one
# flat experiment on a single difficult question with the strongest models
# and watch what happens. This file registers what will be recorded and
# reported. It deliberately registers NO verdict thresholds: a case study
# with n=3 streams cannot confirm or refute anything about creativity, and
# pretending otherwise would be exactly the false precision the methodology
# forbids. Its product is a replayable trace and a committed reading of it.
# Any threshold-bearing claim that grows out of this run requires its own
# fresh prereg before the confirming data is collected.

question:
  suite: bronze (pi-bronze, seeded by scripts/live_run.py seed_bronze,
    frozen in-code before this prereg)
  text: why did the interconnected palace civilizations of the Eastern
    Mediterranean (Mycenaean Greece, Hittite Anatolia, Ugarit, the
    Levantine city-states) collapse nearly simultaneously around
    1200-1150 BC after centuries of stability, while Egypt survived
    diminished?
  why_this_question: a genuinely open scholarly problem (no answer key to
    memorize), with hard checkable contact (chronology, the Ugarit
    archive, destruction layers, paleoclimate data, geography), whose
    differential-survival clause kills single-cause answers and forces
    explanatory structure. The suite's std-hist rubric and skeleton
    discipline (claim / mechanism / scope / forbidden cases) make every
    conjecture state what would have refuted it.

design:
  streams: 3 independent single-model roots, identical seed, identical
    budget. All roles (conjecturer, variator, argumentative critic,
    defender, judges, synthesizer) are played by the stream's one model.
  models:
    - deepseek-v4-pro     # the near-Pareto judge seat (t3: FP 0.125)
    - qwen3.5:397b        # large dense family, mid-severity
    - kimi-k2.6           # the most severe seat in the zoo (t3: FP 0.80)
  temperament_note: the spread of measured judge severity across the three
    models is deliberate - each stream's internal criticism climate is
    part of what is being observed.
  cycles: 50 per stream (budget guard may stop a stream earlier)
  token_budget: 500000 per stream, reserve-settle meter
  reasoning: policy defaults (config/ollama-live.yaml pinned per model)
  concurrency: scheduler is single-threaded per root; 3 roots in parallel
    = 3 requests in flight account-wide (subscription ceiling)
  roots: runs/bronze_flat/<model> during execution; on completion each
    root is copied to experiments/bronze_flat_2026-07-13/<model>/ and must
    pass verify_root with zero violations to count as evidence

instrument_context_recorded_up_front:
  - the argumentative critic is a known indiscriminate prosecutor
    (critic_specificity: convicts 0.675 of verified-sound arguments), and
    LLM judges have a universal generalization gap (e02 t3). Refuted and
    accepted statuses inside these runs are therefore treated as the
    behavior of the criticism climate, NOT as ground truth about the
    conjectures. The full trace is the record; readings re-examine kills.
  - no observe-only criticism policy exists in this build; the standard
    loop runs as-is. That the dynamics may be dominated by critic
    temperament is an anticipated finding, not a surprise.

registered_observables:  # committed to report, all descriptive
  - novelty trajectory per stream under the nomic embedder: pairwise
    near-duplicate rate, mean sibling distance, distance-to-seed over
    cycles (does variation collapse into paraphrase, as E0.1 found for
    gemma, or do strong models actually move?)
  - mechanism inventory: distinct causal mechanisms proposed per stream,
    counted two ways - embedder clusters and a committed human reading of
    every surviving and every killed conjecture
  - cross-stream convergence: do the three families propose the same
    mechanisms or partition the explanation space? overlap matrix by
    mechanism class
  - criticism dynamics: kills, survivals, reinstatements, reinstatement
    fights per stream; whether any killed-then-reinstated line ends as a
    frontier survivor
  - differential-survival contact: does any stream spontaneously use the
    Egypt/Assyria survival asymmetry as a weapon against its own or rival
    conjectures (the mark of taking the hard clause seriously)?
  - forbidden-case quality: are registered forbidden cases concrete and
    datable, or vacuous? counts by committed reading
  - detector signals as emitted (contraction, gate blocks, g_churn,
    attack-target entropy) - recorded, non-adjudicating
  - wire discipline per model (parse failures, retries, malformed cycles)
    extending the compat picture
  - tokens, latency, cycles completed per stream
  - anything anomalous, logged as F-numbered findings (the two prior live
    tranches each produced one unplanned finding)

commitments:
  report: experiments/results/bronze_flat_v1_report.json plus a narrative
    reading (case-study prose, clearly marked interpretive) in the report
  index_line: appended to experiments/results/INDEX_2026-07-13.md
  no_creativity_verdicts: this run neither confirms nor refutes LLM
    creativity; it generates candidate phenomena and preregisterable
    hypotheses
  replay: retained roots must pass verify_root clean; the run is evidence
    only if byte-replayable

budget:
  llm_tokens: <= 1500000 total (500000 per stream), max 3 in flight

# --- amendment 1, recorded BEFORE any live call (zero tokens spent) ---
amendment_1:
  when: first launch attempt, 2026-07-13
  what_happened: all three streams crashed pre-dispatch (no request left
    the machine) on ROUTE_LEASE_MISMATCH - finding F2, the shipped
    config/ollama-live.yaml stamps an empty family on every endpoint while
    the route lease infers a real one, so the route firewall fails closed
    on the first call of ANY live root using that config. Fixed in code
    (endpoint family now defaults to the same deterministic inference the
    lease uses; explicit config override still wins) with a regression
    test in tests/test_providers.py.
  design_change: pure single-model streams are impossible for this suite
    by the harness's own normative invariant - rubric trials require two
    judge seats from DIFFERENT model families
    (require_cross_family_judge_ensemble), and the bronze suite's
    kappa-hist commitment makes rubric trials certain. Amended design:
    all generative roles (conjecturer, variator, argumentative critic,
    defender, synthesizer, thesis) and judge seat 1 remain the stream's
    model; judge seat 2 is gpt-oss:120b in ALL three streams (held
    constant across streams as a control; family openai-gpt is distinct
    from deepseek, qwen, and ollama:kimi). Cross-stream comparisons of
    criticism climate therefore reflect the stream model's critic and
    first judge seat, with an identical second opinion everywhere.
  tokens_spent_before_amendment: 0

# --- appended after the run (readings against the prereg as written) ---
result:
  report: experiments/results/bronze_flat_v1_report.json
  roots: experiments/bronze_flat_2026-07-13/ (all three verify_root clean,
    zero violations)
  completed: 50/50 cycles per stream; 814946 of 1500000 tokens
    (deepseek 206k, qwen 201k, kimi 408k)
  headline_observations:  # descriptive, per the no-verdicts commitment
    - repertoire is scholarly, convergent, and non-novel - all three
      streams opened with systems-network collapse, then covered the
      published historiography menu (military technology, drought,
      earthquake storm, pandemic, iron diffusion); zero mechanisms beyond
      the literature
    - the court convicted everything - 10/10 substantive conjectures
      refuted, zero frontier survivors, zero reinstatements; live
      unscripted confirmation of the critic_specificity diagnosis
    - dominant conviction ground is a scope-formalism trap - the
      skeleton's covers/excludes format turns the question's own
      differential-survival clause into an automatic contradiction charge
    - F3 - the critic also refuted the run's own std-hist standard and 8
      school-stance seeds across two streams; no artifact class is
      shielded from objection-equals-warrant
    - F4 - after each opening kill, every stream circled its first idea's
      battery-equivalence class for the rest of the run (165/183/269 gate
      blocks, 273/183/927 content-address no-op re-registrations); the
      admitted stream is diverse under nomic (0.53-0.58 mean pairwise)
      but admission is the survivor filter
  hypotheses_generated_for_future_preregs:
    - observe-only or witness-routed criticism is a precondition for
      observing long-horizon generative capability
    - infrastructure artifacts (standards, stance seeds) need protected
      status or trial-gated attack admission
    - the skeleton needs an explicit differential-outcome field so
      explaining a survivor is not chargeable as scope contradiction
  operational: legacy live_run.py path used (manifest_present false);
    future preregs should compile a RunManifest and go through
    ops.run_scheduler preflight. Judge ensemble-split blocked 1/1/6
    rubric trials (protective abstention working as designed).

# --- correction 1, appended after operator review (record never edited) ---
correction_1:
  corrects: the result block above and the report's narrative reading
  detail: experiments/results/bronze_flat_v1_correction1.json
  summary: the run's novelty figures were hashing-128, not nomic (live_run
    constructs Scheduler without an embedder; the nomic default never
    reaches that path) - true offline nomic distances show topic dominance
    (distinct mechanisms at the paraphrase margin), so embedding novelty
    cannot resolve mechanism diversity either way. F4 is reattributed - the
    blocked proposals were mechanism-diverse (verified from raw responses);
    the embargo was manufactured by the gate stack (one-bit skeleton-wf
    battery + NEAR_DUP_EPS None disabling the semantic stage + no
    RelapseDomain scoping + the admit-with-counter-warrant escape
    unreachable because production Conj passes an empty warrant list).
    The prosecutor-alone conviction path is confirmed in code and log
    (batch kill at seq 53/55/57, no defender or judge participation).

# --- correction 2, appended after external plan review (record never edited) ---
correction_2:
  corrects: the report's and correction_1's reading of Register-without-A+
    event counts (273/183/927) as content-address dedup of resubmitted
    proposals
  verified_actual: those events are NEW commitment registrations - 925 of
    kimi's 927 have a single fc:* (forbidden-case) output; register_commitment
    commits an event only for NEW commitments (dedup returns early with no
    event), and compile_interface registers model-authored forbidden-case
    commitments BEFORE the anti-relapse gate runs. The counts are therefore
    evidence of pre-gate registry mutation by blocked proposals (each blocked
    skeleton still adds its forbidden cases to the commitment registry), not
    of byte-identical resubmission. Credit - external repair-plan review
    (deepreason-postrun-repair-plan-v2), root cause RC5.
