# Bronze court-cross v1 - PRE-REGISTERED, committed before any live call.
# Phase J study 2: measure court temperament without changing the candidate
# population. The candidate pool is FROZEN and BLINDED before any judging
# call; the treatment is the critic/judge configuration alone.

candidate_pool:
  source: the bronze flat v1 emitted-proposal census
    (experiments/results/bronze_flat_v1_census.json) - registered AND
    gate-blocked proposals both included, deduplicated by content hash,
    stripped of stream/model provenance before judging (blinding)
  frozen: pool content hashes listed in the report before the first call

design:
  treatment: critic and judge configuration, crossed over the same pool
  arms:
    - critic deepseek-v4-flash, judges [deepseek-v4-pro, gpt-oss:120b]
    - critic kimi-k2.6, judges [kimi-k2.6, gpt-oss:120b]
    - critic mistral-large-3:675b, judges [mistral-large-3:675b, gpt-oss:120b]
  authority: observe_only - no status changes anywhere; this study measures
    verdict DISTRIBUTIONS, not survivors
  per_item: objection (if any), defender response, two-seat ruling with
    order swap - the defended-trial protocol from defended_trial_v1

predictions:
  P1:
    statement: court temperament dominates candidate identity - the
      between-arm spread in objection rate on the SAME pool is >= 25
      percentage points (consistent with the zoo severity span)
  P2:
    statement: the scope-formalism conviction ground replicates across
      courts - >= 30 percent of each arm's objections to skeleton items
      dispute covers/excludes consistency rather than mechanism substance
      (coding rules frozen with the pool)
  P3:
    statement: order-swap disagreement stays <= 0.15 per arm (protocol
      stability under new critics)

decision_rules: report experiments/results/bronze_court_cross_v1_report.json;
  index line appended
budget: {llm_tokens: <= 600000, max 3 in flight}

# --- amendment 1, recorded BEFORE any judging call (zero tokens spent) ---
amendment_1:
  pool: the prereg's eligible set (registered + gate-blocked census
    candidates, deduplicated) holds 627 unique items - beyond the judging
    budget. Frozen deterministic subsample of 110 (seed 42 over sorted
    content hashes) committed at experiments/court_cross_pool_v1.json
    before any call.
  defender: the prereg named critics and judge seats but no defender.
    Pinned - deepseek-v4-pro in ALL arms (the defended_trial_v1 defender,
    held constant so the treatment stays the court alone).
  ruling_protocol: "two-seat ruling with order swap" is implemented as an
    order SPLIT across the two seats (seat 1 sees objection first, seat 2
    sees defence first) - one ruling per seat, fitting the 600k budget.
    P3's disagreement measure is therefore seat-plus-order disagreement,
    not a pure order effect; recorded as a known confound.
  runner: scripts/court_cross_run.py, checkpoints under
    experiments/court_cross_run/, ledger ceiling 600000, max 3 in flight,
    launched only after the repertoire arms release the concurrency slots
  tokens_spent_before_amendment: 0

# --- amendment 2, recorded after arm 1 exhausted the ledger (recorded
# --- BEFORE any further judging call) ---
amendment_2:
  what_happened: the per-item cost estimate in amendment 1 (~1.7k tokens,
    from defended_trial_v1's short prose items) was wrong for this pool -
    the skeleton JSON artifacts are far longer, and the dsflash arm alone
    consumed the 600000 ledger at 85 of 110 items (~7k/item). The kimi and
    mistral arms never started.
  correction_before_further_spend:
    effective_pool: the FIRST 85 pool items in the frozen deterministic
      order (the exact set the dsflash arm completed; completion order is
      content-hash order, independent of item content or verdicts, so the
      subset is outcome-blind). All arms are scored on these 85 only; the
      dsflash arm's remaining 25 items are not judged.
    new_ceiling: 1600000 total (the original 600000 already spent plus
      up to 1000000 for the two remaining arms at the measured ~7k/item)
    everything_else: unchanged (same courts, defender, order-split
      protocol, runner, checkpoints)
  tokens_spent_at_amendment: 601578

# --- amendment 3, recorded BEFORE further spend (P1 undecidable at the
# --- mistral arm's 41/85 shortfall) ---
amendment_3:
  why: at the second ledger stop the dsflash and kimi arms are complete
    (85/85) and mistral sits at 41/85. P2 is already decidable (worst-case
    floor 26/85 = 0.306 >= 0.30 in the mistral arm; other arms far above).
    P1 is NOT decidable - mistral's completed objection rate spans 0.482
    to 1.0 depending on the unjudged 44 items, straddling the 25pp line.
  action: ceiling raised to 2000000 (measured mistral cost ~8k/item x 44
    remaining) to complete the mistral arm ONLY; no other change.
  tokens_spent_at_amendment: 1602115

# --- appended after the run (verdicts against the prereg as written) ---
result:
  report: experiments/results/bronze_court_cross_v1_report.json
  verdicts: {P1: REFUTED, P2: CONFIRMED, P3: CONFIRMED}
  measured:
    objection_rates: {dsflash: 1.0, kimi: 1.0, mistral: 0.9882}
    p1_spread_pp: 1.18   # bar 25 - refuted by two orders of magnitude
    scope_formalism_share: {dsflash: 0.847, kimi: 0.929, mistral: 0.738}
    seat_disagreement: {dsflash: 0.107, kimi: 0.094, mistral: 0.131}
    outcomes_pooled: {overrule: 94, abstain: 156, sustain: 3, no_ruling: 1}
    tokens: 1949271 of 2000000 (amendments 2-3)
  headline_readings:
    - P1 refuted in the most informative way - court temperament does not
      dominate because there is NO temperament variance on real harness
      output; every critic family objects to essentially every artifact.
      The judge zoo's severity spectrum was a property of curated test
      corpora, not of criticism in the wild
    - the scope-formalism conviction ground is court-universal (74-93
      percent of objections), confirming it is manufactured by the
      skeleton's covers/excludes format, not by any model family
    - the defended protocol is the only working filter - 3 sustains in 255
      trials, seat-stable everywhere (P3 confirmed); prosecution is
      unconditional, conviction is rare
  feedback_v1_gate: the prereg's "calibrated court" precondition is met in
    protocol terms (stable, known distributions), not in court-selection
    terms (no court differentiates). The defended protocol itself is the
    calibration.
