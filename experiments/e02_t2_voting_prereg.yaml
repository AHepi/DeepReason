# E0.2 tranche 2: judge vote aggregation — PRE-REGISTERED. Committed
# BEFORE the tranche-1 raw judgments are re-aggregated and BEFORE any
# clean-item token is spent.
#
# Question: does either-suffices voting (a flaw counts as caught when
# EITHER seat flags it) recover the diversity benefit that tranche 1
# showed require-both voting destroys, and at what false-positive cost?

design:
  arm_a_reaggregation: >
    Zero-token replay: recompute tranche-1 catch rates from the committed
    per-seat raw judgments (experiments/e02_t1_items/judgments.jsonl)
    under two rules: require-both (incumbent) and either-suffices. No new
    judging; pure recomputation. This is the first look at per-seat union
    behavior; that is why this file precedes it.
  arm_b_clean_items: >
    Live: 40 flaw-free explanatory artifacts generated by the tranche-1
    adversary pipeline (same neutral topic pools, prompt asks for SOUND
    arguments, hidden annotation marks them clean), judged by the same
    four seat configurations as tranche 1. False-positive rate per rule =
    fraction of clean items flagged as flawed.
  seats: same as tranche 1 (gpt-oss:120b x2; gpt-oss:120b + qwen3-coder:480b)
  concurrency: max 3 in flight

predictions:
  P1:
    statement: either-suffices raises the cross-family unknown-flaw catch
      rate to >= 0.55 (from 0.175 under require-both), i.e. at least
      matches the same-family require-both rate
  P2:
    statement: either-suffices false-positive rate on clean items <= 0.25
    falsifier: > 0.40, and the vote change is rejected as too expensive
      regardless of catch gains
  P3:
    statement: net improvement is positive - the percentage-point gain in
      unknown-flaw catch (either-suffices minus require-both, cross-family)
      exceeds the percentage-point rise in clean-item false positives

adoption_condition: >
  Vote-rule adoption in the harness is conditional on BOTH a confirmed P3
  here AND the recusal requirement recorded below; neither alone suffices.
  Recusal (a seat that issued a ruling is excluded from any trial
  adjudicating that ruling's validity node) cannot be tested on this
  fixture because it concerns in-run overturn dynamics; it is registered
  here as a binding design requirement for the live adoption experiment.

decision_rules:
  - verdicts against literal numbers; report at
    experiments/results/e02_t2_voting_report.json; index line appended
budget:
  llm_tokens: <= 400000 (clean-item generation + 4 seat-configs x 40 items)
