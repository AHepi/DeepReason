# GLM flat run v1 - PRE-REGISTERED OBSERVATIONAL, committed before any call.
# Operator directive: one more flat run - glm-5.2 (untested family, absent
# from all prior tranches) in every role, thinking off, 1M tokens, the
# bronze problem. Court-cross showed critic families make no difference;
# this run observes a fresh family under the standing observe-only policy.
design:
  model: glm-5.2 in ALL roles except judge seat 2 (gpt-oss:120b - the
    cross-family judge invariant is compile-enforced for rubric workloads)
  reasoning: none (thinking off)
  suite: bronze (pi-bronze, unchanged)
  runtime: evidence mode (schema-v2 manifest, preflight), observe-only
    (standing policy), NEAR_DUP_EPS 0.35, CONTROLLER false, nomic embedder
  budget: 1000000 tokens, reserve-settle; cycles 100 (budget-bound)
  monitoring: operator receives a log digest every 2 minutes during the run
observational: no verdict thresholds; registered observables as in
  bronze_flat_v1 (emitted population, statuses, scrutiny, gate receipts,
  novelty under nomic, wire discipline, anomalies as F-findings)
commitments: report experiments/results/glm_flat_v1_report.json; index
  line; root retained and verify_root clean

# --- amendment 1 (operator correction before the run proper) ---
amendment_1:
  correction: the operator's directive was misread - the problem to pose
    is the JUDGE problem (the harness's self-referential criticism suite,
    pi-criticism - under what conditions does criticism-filtered voting
    beat self-consistency, with the repo's measured validation data in the
    problem statement), NOT the bronze question. The bronze launch was
    killed at 2253 tokens; root runs/glm_flat discarded (never an
    experiment, never scored).
  corrected_design: suite=criticism, everything else unchanged (glm-5.2
    all roles, gpt-oss:120b judge seat 2 by compile invariant, thinking
    off, 1M budget, evidence mode, observe-only, 2-minute log digests)
  root: runs/glm_judge

# --- appended after the run (observational readings) ---
result:
  report: experiments/results/glm_judge_v1_report.json
  root: experiments/glm_judge_2026-07-14/ (verify_root clean)
  completed: 998291 of 1000000 tokens, 20 cycles, clean budget stop
  headline: 46 designs admitted (zero gate blocks), 14 standing, 32
    refuted (30 by program checks, 2 by sustained defended trials).
    The frontier converged on an explicit theory - criticism beats
    self-consistency only inside a majority-fragility window with critic
    precision above a derived threshold p_min(e,r,k) - whose own numbers,
    applied to the repository's measured critic (precision 0.333), predict
    that criticism-filtered voting loses. The model derived the session's
    empirical conclusion independently, as a theorem with thresholds.
